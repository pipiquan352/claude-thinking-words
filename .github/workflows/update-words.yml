name: Check for new thinking words

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9am UTC
  workflow_dispatch:       # Manual trigger

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check for word changes
        id: check
        run: bash scripts/check-words.sh

      - name: Create issue if changed
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "New thinking words in v${{ steps.check.outputs.version }}" \
            --body "${{ steps.check.outputs.body }}" \
            --label "new-words"
