<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code's Secret Thinking Words</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Space Grotesk',system-ui,sans-serif;
  background:#faf7f5;color:#2d2420;line-height:1.6;
  overflow-x:hidden;min-height:100vh;
  display:flex;flex-direction:column;
}

/* ─── Hero (kept from v2) ─── */
.hero{
  text-align:center;
  padding:clamp(2rem,5vw,3.5rem) 1.5rem clamp(1.2rem,3vw,2rem);
  background:#faf7f5;
  position:relative;flex-shrink:0;
}
.hero::after{
  content:'';position:absolute;
  bottom:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(45,36,32,.1),transparent);
}
.hero-badge{
  display:inline-flex;align-items:center;gap:.5rem;
  padding:.3rem .9rem;background:#fff0eb;color:#e8613c;
  border-radius:100px;font-size:.75rem;font-weight:600;
  letter-spacing:.03em;margin-bottom:1rem;
}
.hero h1{
  font-size:clamp(1.8rem,4.5vw,3rem);font-weight:700;
  line-height:1.15;letter-spacing:-.03em;margin-bottom:.5rem;
}
.hero h1 .hl{
  background:linear-gradient(135deg,#e8613c,#7c5cfc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero p{
  color:#8a7e76;font-size:clamp(.9rem,1.4vw,1.05rem);
  max-width:480px;margin:0 auto;
}
.hero p em{font-style:normal;color:#2d2420;font-weight:500}

/* ─── Spinner + Controls ─── */
.controls{
  display:flex;align-items:center;justify-content:center;
  gap:1rem;padding:1.2rem 1rem;flex-wrap:wrap;
  background:#faf7f5;flex-shrink:0;
}
.spinner-box{
  width:min(60vw,320px);height:85px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#2d2420;border-radius:14px;gap:.1rem;
}
.sp-row{display:flex;align-items:center}
.sp-icon{
  font-family:'Space Mono',monospace;font-size:1rem;
  color:#7c5cfc;margin-right:.4rem;width:1rem;text-align:center;
}
.sp-word{
  font-family:'Space Mono',monospace;
  font-size:clamp(.95rem,2.2vw,1.15rem);
  color:#f5f0eb;font-weight:700;white-space:nowrap;
}
.sp-word.cyc{animation:wf .08s ease}
@keyframes wf{0%{opacity:.3}100%{opacity:1}}
.sp-zh{font-size:.7rem;color:#8a7e76;font-family:system-ui,sans-serif;min-height:1em;transition:opacity .2s}
.sp-dots span{opacity:0;color:#f5f0eb;font-family:'Space Mono',monospace}
.sp-dots.on span:nth-child(1){animation:df 1.2s 0s infinite}
.sp-dots.on span:nth-child(2){animation:df 1.2s .2s infinite}
.sp-dots.on span:nth-child(3){animation:df 1.2s .4s infinite}
@keyframes df{0%,20%{opacity:0}40%,60%{opacity:1}80%,100%{opacity:0}}

.btn{
  font-family:'Space Grotesk',sans-serif;font-weight:600;
  padding:.6rem 1.4rem;border-radius:100px;border:none;cursor:pointer;
  transition:all .2s;font-size:.85rem;
  display:flex;align-items:center;gap:.4rem;
}
.btn-spin{background:#e8613c;color:#fff}
.btn-spin:hover{background:#d4552f;transform:translateY(-1px);box-shadow:0 4px 16px rgba(232,97,60,.3)}
.btn-search{background:#fff;color:#8a7e76;border:1.5px solid rgba(45,36,32,.12)}
.btn-search:hover{border-color:#7c5cfc;color:#7c5cfc}
.btn-search svg{width:14px;height:14px}
.btn-search kbd{
  font-family:'Space Mono',monospace;font-size:.6rem;
  background:#faf7f5;padding:.08rem .3rem;border-radius:3px;
  border:1px solid rgba(45,36,32,.1);
}

/* ─── Category nav (emoji tabs) ─── */
.cat-nav{
  display:flex;justify-content:center;gap:.3rem;
  padding:.6rem 1rem;background:#faf7f5;flex-shrink:0;
  border-bottom:1px solid rgba(45,36,32,.06);
}
.cat-tab{
  width:36px;height:36px;border-radius:12px;border:none;cursor:pointer;
  font-size:1.15rem;display:flex;align-items:center;justify-content:center;
  background:transparent;transition:all .2s;opacity:.45;
}
.cat-tab:hover{opacity:.75;background:rgba(0,0,0,.03);transform:scale(1.08)}
.cat-tab.active{opacity:1;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);transform:scale(1.12)}

/* ─── Slides area ─── */
.slides-area{flex:1;position:relative;overflow:hidden;min-height:0}
.slides-track{display:flex;height:100%;transition:transform .45s cubic-bezier(.4,0,.15,1)}
.slide{min-width:100%;height:100%;overflow:hidden;position:relative}

/* Slide theme backgrounds — LIGHT pastels */
.slide[data-theme=purple]{background:linear-gradient(160deg,#f0edff,#e8e2ff 50%,#ddd5ff)}
.slide[data-theme=accent]{background:linear-gradient(160deg,#fff0eb,#ffe4d9 50%,#ffd9ca)}
.slide[data-theme=teal]{background:linear-gradient(160deg,#e6f7f5,#d4f0ec 50%,#c2eae4)}
.slide[data-theme=amber]{background:linear-gradient(160deg,#fff8e1,#fff0c4 50%,#ffe8a8)}
.slide[data-theme=rose]{background:linear-gradient(160deg,#ffeef4,#ffdde8 50%,#ffcede)}
.slide[data-theme=indigo]{background:linear-gradient(160deg,#eef1ff,#e0e6ff 50%,#d2daff)}
.slide[data-theme=green]{background:linear-gradient(160deg,#eef8f0,#ddf2e2 50%,#ccecce)}
.slide[data-theme=brown]{background:linear-gradient(160deg,#fef3e2,#fde8c8 50%,#fcddb0)}
.slide[data-theme=gray]{background:linear-gradient(160deg,#f0eeeb,#e8e4e0 50%,#ddd8d3)}
.slide[data-theme=egg]{background:linear-gradient(160deg,#fdf6e3,#f9edcc 50%,#f3e2b0)}

/* Decorative themed shapes */
.deco{position:absolute;pointer-events:none;z-index:0;opacity:.35}
.deco svg{width:100%;height:100%}
.deco-a{right:-5%;bottom:-8%;width:clamp(220px,45vw,480px);height:clamp(220px,45vw,480px);animation:breathe 6s ease-in-out infinite}
.deco-b{left:-6%;top:3%;width:clamp(150px,30vw,320px);height:clamp(150px,30vw,320px);animation:breathe 8s ease-in-out 1s infinite}
@keyframes breathe{
  0%,100%{transform:scale(1);opacity:.35}
  50%{transform:scale(1.08);opacity:.5}
}

.slide-inner{
  position:relative;z-index:1;
  padding:clamp(1.5rem,4vw,2.5rem) clamp(1.2rem,4vw,3rem) clamp(2rem,4vw,3rem);
  max-width:960px;margin:0 auto;
}

.slide-header{margin-bottom:clamp(1.2rem,3vw,2rem)}
.slide-icon{font-size:clamp(2.5rem,6vw,3.5rem);line-height:1;margin-bottom:.4rem}
.slide-title{
  font-size:clamp(1.5rem,3.5vw,2.2rem);font-weight:700;
  letter-spacing:-.03em;line-height:1.1;color:#2d2420;
}
.slide-sub{display:flex;align-items:center;gap:.6rem;margin-top:.3rem}
.slide-zh{font-size:clamp(.8rem,1.4vw,.95rem);color:#8a7e76}
.slide-badge{
  font-size:.65rem;font-weight:600;padding:.15rem .5rem;
  border-radius:100px;background:rgba(45,36,32,.08);color:#6b5f55;
}

/* Featured grid */
.feat-grid{
  display:flex;flex-wrap:wrap;gap:clamp(.5rem,1.2vw,.8rem);
  margin-bottom:1rem;
}
.feat-card{
  display:flex;align-items:center;gap:.55rem;
  padding:.55rem .9rem .55rem .65rem;
  border-radius:14px;background:rgba(255,255,255,.65);
  backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.5);
  cursor:pointer;transition:all .22s;
}
.feat-card:hover{
  background:rgba(255,255,255,.9);
  transform:translateY(-3px);
  box-shadow:0 6px 20px rgba(0,0,0,.07);
}
.feat-card:active{transform:scale(.97)}
.feat-card .fc-e{font-size:clamp(1.5rem,3vw,2rem);flex-shrink:0}
.feat-card .fc-t{display:flex;flex-direction:column;gap:.02rem}
.feat-card .fc-en{font-size:clamp(.78rem,1.1vw,.88rem);font-weight:600;color:#2d2420;line-height:1.2}
.feat-card .fc-zh{font-size:.63rem;color:#8a7e76;font-family:system-ui,sans-serif}

/* Vary sizes */
.feat-card:nth-child(3n+1){padding:.7rem 1.1rem .7rem .8rem}
.feat-card:nth-child(3n+1) .fc-e{font-size:clamp(1.8rem,3.5vw,2.4rem)}
.feat-card:nth-child(3n+1) .fc-en{font-size:clamp(.85rem,1.3vw,.98rem)}

/* Show all drawer */
.drawer-btn{
  font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:500;
  color:#8a7e76;background:none;border:none;cursor:pointer;
  display:flex;align-items:center;gap:.3rem;padding:.4rem 0;
  transition:color .15s;
}
.drawer-btn:hover{color:#2d2420}
.drawer-btn svg{width:14px;height:14px;transition:transform .2s}
.drawer-btn.open svg{transform:rotate(180deg)}

.drawer{display:none;flex-wrap:wrap;gap:.4rem;padding:.6rem 0}
.drawer.open{display:flex}

.mpill{
  padding:.3rem .7rem;border-radius:100px;
  font-size:.72rem;font-weight:500;
  background:rgba(255,255,255,.55);color:#2d2420;
  border:1px solid rgba(255,255,255,.4);
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:.35rem;
}
.mpill:hover{background:rgba(255,255,255,.85);transform:translateY(-1px)}
.mpill .me{font-size:.85rem}
.mpill .mz{font-size:.55rem;color:#8a7e76;font-family:system-ui,sans-serif}

/* Bottom nav arrows */
.bottom-nav{
  display:flex;align-items:center;justify-content:center;gap:.8rem;
  padding:.6rem;background:#faf7f5;flex-shrink:0;
  border-top:1px solid rgba(45,36,32,.06);
}
.arrow{
  width:36px;height:36px;border-radius:50%;
  border:1.5px solid rgba(45,36,32,.12);background:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:#2d2420;transition:all .15s;
}
.arrow:hover{border-color:#e8613c;color:#e8613c}
.arrow:disabled{opacity:.25;cursor:default}
.arrow svg{width:16px;height:16px}
.page-info{font-size:.75rem;color:#8a7e76;font-weight:500;min-width:60px;text-align:center}

/* ─── Search overlay ─── */
.search-ov{
  position:fixed;inset:0;z-index:200;
  background:rgba(250,247,245,.97);backdrop-filter:blur(16px);
  display:none;flex-direction:column;
}
.search-ov.open{display:flex}
.s-bar{
  display:flex;align-items:center;gap:.75rem;
  padding:1rem clamp(1rem,3vw,2rem);
  border-bottom:1px solid rgba(45,36,32,.08);
}
.s-bar svg{width:20px;height:20px;color:#8a7e76;flex-shrink:0}
.s-bar input{
  border:none;outline:none;background:none;
  font-family:'Space Grotesk',sans-serif;
  font-size:1.15rem;color:#2d2420;width:100%;font-weight:500;
}
.s-bar input::placeholder{color:#c4bbb4}
.s-close{
  font-family:'Space Grotesk',sans-serif;font-size:.75rem;font-weight:500;
  color:#8a7e76;background:rgba(0,0,0,.04);border:none;cursor:pointer;
  padding:.3rem .7rem;border-radius:6px;transition:all .15s;
}
.s-close:hover{background:rgba(0,0,0,.08);color:#2d2420}
.s-count{padding:.5rem clamp(1rem,3vw,2rem);font-size:.75rem;color:#8a7e76;font-weight:500}
.s-results{
  flex:1;overflow-y:auto;padding:.5rem clamp(1rem,3vw,2rem) 2rem;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));
  gap:.6rem;align-content:start;
}
.sr-c{
  display:flex;flex-direction:column;align-items:center;gap:.2rem;
  padding:.75rem .5rem;border-radius:14px;background:#fff;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
  cursor:pointer;transition:all .2s;text-align:center;
}
.sr-c:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.08)}
.sr-c .re{font-size:1.5rem}
.sr-c .rn{font-size:.82rem;font-weight:600;color:#2d2420}
.sr-c .rn mark{background:rgba(124,92,252,.2);color:#2d2420;border-radius:2px;padding:0 .1rem}
.sr-c .rz{font-size:.68rem;color:#8a7e76;font-family:system-ui,sans-serif}
.sr-c .rc{font-size:.58rem;color:#bbb;margin-top:.1rem}
.s-empty{grid-column:1/-1;text-align:center;padding:3rem 1rem;color:#8a7e76}
.s-empty .be{font-size:3rem;margin-bottom:.5rem}

/* ─── Footer ─── */
footer{text-align:center;padding:1rem;font-size:.7rem;color:#bbb;flex-shrink:0;background:#faf7f5}
footer a{color:#e8613c;text-decoration:none}

/* Easter egg bonus slide — unique style */
.slide[data-theme=egg] .slide-inner{text-align:center}
.slide[data-theme=egg] .slide-header{margin-bottom:clamp(.8rem,2vw,1.2rem)}
.slide[data-theme=egg] .feat-grid{justify-content:center}
.bonus-note{
  margin-top:1rem;padding:.7rem 1.2rem;border-radius:14px;
  background:rgba(255,255,255,.6);font-size:.78rem;color:#6b5f55;
  line-height:1.6;text-align:left;display:inline-block;
  border:1.5px dashed rgba(180,150,50,.35);
}
.bonus-note strong{color:#e8613c}
.feat-card.egg{
  background:rgba(255,255,255,.7);
  border:1.5px dashed rgba(180,150,50,.4);
  position:relative;overflow:hidden;
}
.feat-card.egg::after{
  content:'';position:absolute;top:-2px;right:-2px;
  width:18px;height:18px;border-radius:0 12px 0 8px;
  background:linear-gradient(135deg,#e8613c,#7c5cfc);opacity:.6;
}
.feat-card.egg:hover{
  background:rgba(255,255,255,.9);
  border-color:rgba(124,92,252,.4);
  transform:translateY(-4px) rotate(-1deg);
}
.slide[data-theme=egg] .feat-card:nth-child(even):hover{transform:translateY(-4px) rotate(1deg)}

/* Milestone toast */
.toast{
  position:fixed;top:-60px;left:50%;transform:translateX(-50%);
  padding:.5rem 1.2rem;border-radius:100px;
  background:#2d2420;color:#f5f0eb;font-size:.82rem;font-weight:600;
  display:flex;align-items:center;gap:.5rem;
  box-shadow:0 8px 30px rgba(0,0,0,.15);z-index:300;
  transition:top .4s cubic-bezier(.4,0,.15,1);white-space:nowrap;
}
.toast.show{top:1rem}
.toast .t-em{font-size:1.2rem}

/* Explorer counter */
.counter{
  display:flex;align-items:center;gap:.5rem;
  padding:.3rem .8rem;border-radius:100px;
  background:rgba(45,36,32,.05);font-size:.72rem;color:#8a7e76;
  font-weight:500;transition:all .3s;
}
.counter .c-num{
  font-weight:700;color:#e8613c;font-size:.8rem;
  font-family:'Space Mono',monospace;min-width:1.6em;text-align:right;
}
.counter .c-bar{
  width:60px;height:5px;border-radius:3px;background:rgba(45,36,32,.08);overflow:hidden;
}
.counter .c-fill{
  height:100%;border-radius:3px;width:0%;
  background:linear-gradient(90deg,#e8613c,#7c5cfc);
  transition:width .4s cubic-bezier(.4,0,.15,1);
}
.counter.done{background:rgba(124,92,252,.1);color:#7c5cfc}
.counter.done .c-num{color:#7c5cfc}
.trophy{display:none;font-size:.85rem;animation:pop .4s cubic-bezier(.17,.67,.21,1.27)}
.counter.done .trophy{display:inline}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}

@media(max-width:600px){
  .controls{gap:.6rem}
  .spinner-box{width:min(55vw,240px);height:72px}
  .sp-word{font-size:.85rem}
  .feat-card{padding:.45rem .7rem .45rem .55rem}
  .s-results{grid-template-columns:repeat(auto-fill,minmax(115px,1fr))}
  .cat-tab{width:30px;height:30px;font-size:1rem;border-radius:10px}
}
</style>
</head>
<body>

<section class="hero">
  <div class="hero-badge">source: cli.js &middot; 176 words + 8 easter eggs</div>
  <h1>Claude Code's <span class="hl">Secret Words</span></h1>
  <p>When Claude thinks, it picks from <em>176 delightful words</em>. Tap to explore each one.</p>
</section>

<div class="controls">
  <div class="spinner-box">
    <div class="sp-row">
      <span class="sp-icon" id="spI">&#x25D0;</span>
      <span class="sp-word" id="spW">Clauding</span>
      <span class="sp-dots on" id="spD"><span>.</span><span>.</span><span>.</span></span>
    </div>
    <div class="sp-zh" id="spZ">&#x514B;&#x52B3;&#x4E01;&#x4E2D;</div>
  </div>
  <button class="btn btn-spin" onclick="spin()">Spin</button>
  <div class="counter" id="ctr">
    <span class="c-num" id="cNum">0</span>/<span>184</span>
    <div class="c-bar"><div class="c-fill" id="cFill"></div></div>
    <span class="trophy">🏆</span>
  </div>
  <button class="btn btn-search" id="sTrig">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
    Search <kbd>Ctrl+K</kbd>
  </button>
</div>

<nav class="cat-nav" id="catNav"></nav>

<div class="slides-area">
  <div class="slides-track" id="track"></div>
</div>

<div class="bottom-nav">
  <button class="arrow" id="pBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg></button>
  <span class="page-info" id="pgInfo">1 / 9</span>
  <button class="arrow" id="nBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg></button>
</div>

<div class="toast" id="toast"><span class="t-em"></span><span class="t-msg"></span></div>
<footer>Extracted from <a href="https://github.com/anthropics">@anthropic-ai/claude-code</a> cli.js by ππ</footer>

<!-- Search -->
<div class="search-ov" id="sOv">
  <div class="s-bar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="sIn" placeholder="Search English or Chinese..." autocomplete="off">
    <button class="s-close" id="sCl">ESC</button>
  </div>
  <div class="s-count" id="sCt">176 words across 9 categories</div>
  <div class="s-results" id="sRe"></div>
</div>

<script>
const E={
'Thinking':'\u{1F914}','Pondering':'\u{1F9D0}','Contemplating':'\u{1F30C}','Considering':'\u2696\uFE0F','Deliberating':'\u{1F3DB}','Cogitating':'\u{1F4A1}','Ruminating':'\u{1F404}','Musing':'\u2601\uFE0F','Mulling':'\u{1F377}','Calculating':'\u{1F9EE}','Deciphering':'\u{1F50D}','Inferring':'\u{1F9E9}','Synthesizing':'\u{1F52C}','Determining':'\u{1F3AF}','Elucidating':'\u{1F4A1}','Cerebrating':'\u{1F9E0}','Perusing':'\u{1F4D6}','Puzzling':'\u{1F9E9}','Ideating':'\u{1F4AD}','Imagining':'\u{1F308}','Envisioning':'\u{1F52E}',

let toastTimer=null;
function showToast(em,msg){
  tEm.textContent=em;tMsg.textContent=msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toast.classList.remove('show'),2500);
}
function markSeen(w){
  if(seen.has(w))return;
  seen.add(w);
  const n=seen.size;
  cNum.textContent=n;
  cFill.style.width=(n/TOTAL*100)+'%';
  if(n>=TOTAL)ctr.classList.add('done');
  const m=MS.find(x=>x[0]===n);
  if(m)showToast(m[1],m[2]);
}

// Spinner
const sI=document.getElementById('spI'),sW=document.getElementById('spW'),
  sZ=document.getElementById('spZ'),sD=document.getElementById('spD');
const IC=['\u25D0','\u25D3','\u25D1','\u25D2'];
let ii=0,si=null,ic=null;

function spin(){
  sD.classList.remove('on');sZ.style.opacity='0';
  let c=0;const t=12+Math.floor(Math.random()*8);
  ic=setInterval(()=>{ii=(ii+1)%4;sI.textContent=IC[ii]},150);
  (function tk(){
    const w=A[Math.floor(Math.random()*A.length)];
    sW.textContent=w;sW.classList.remove('cyc');void sW.offsetWidth;sW.classList.add('cyc');c++;
    if(c<t){si=setTimeout(tk,60+(c/t)*250)}
    else{clearInterval(ic);sD.classList.add('on');sZ.textContent=Z[w]||'';sZ.style.opacity='1';markSeen(w)}
  })();
}
function showW(w){
  clearTimeout(si);clearInterval(ic);
  sW.textContent=w;sW.classList.remove('cyc');void sW.offsetWidth;sW.classList.add('cyc');
  sD.classList.add('on');sZ.textContent=Z[w]||'';sZ.style.opacity='1';markSeen(w);
  ic=setInterval(()=>{ii=(ii+1)%4;sI.textContent=IC[ii]},150);
  setTimeout(()=>clearInterval(ic),1500);
}

D.forEach((c,i)=>{
  const tab=document.createElement('button');
  tab.className='cat-tab'+(i===0?' active':'');
  tab.textContent=c.icon;tab.title=c.en;tab.onclick=()=>go(i);
  nav.appendChild(tab);

  const rest=c.w.filter(w=>!c.f.includes(w));
  const sv=SVG[c.th]||SVG.gray;
  const s=document.createElement('div');
  s.className='slide';s.dataset.theme=c.th;
  s.innerHTML=`
    <div class="deco deco-a">${sv[0]}</div>
    <div class="deco deco-b">${sv[1]}</div>
    <div class="slide-inner">
      <div class="slide-header">
        <div class="slide-icon">${c.icon}</div>
        <div class="slide-title">${c.en}</div>
        <div class="slide-sub">
          <span class="slide-zh">${c.zh}</span>
          <span class="slide-badge">${c.w.length} words</span>
        </div>
      </div>
      <div class="feat-grid">
        ${c.f.map(w=>`
          <div class="feat-card${c.bonus?' egg':''}" onclick="showW('${w.replace(/'/g,"\\'")}')">
            <span class="fc-e">${E[w]||''}</span>

        <button class="drawer-btn" onclick="togD(this)">
          Show all ${c.w.length} words

          ${c.w.map(w=>`<span class="mpill" onclick="showW('${w.replace(/'/g,"\\'")}')">

const pgInfo=document.getElementById('pgInfo');
function go(i){
  cur=Math.max(0,Math.min(i,D.length-1));
  track.style.transform=`translateX(-${cur*100}%)`;
  nav.querySelectorAll('.cat-tab').forEach((t,j)=>t.classList.toggle('active',j===cur));
  document.getElementById('pBtn').disabled=cur===0;
  document.getElementById('nBtn').disabled=cur===D.length-1;
  pgInfo.textContent=`${cur+1} / ${D.length}`;
}
document.getElementById('pBtn').onclick=()=>go(cur-1);
document.getElementById('nBtn').onclick=()=>go(cur+1);
go(0);

let tx=0;
track.addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:true});
track.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-tx;if(Math.abs(d)>50)go(cur+(d>0?-1:1))});
document.addEventListener('keydown',e=>{
  if(document.getElementById('sOv').classList.contains('open'))return;
  if(e.key==='ArrowLeft')go(cur-1);if(e.key==='ArrowRight')go(cur+1);
});

function togD(b){
  const d=b.nextElementSibling,o=d.classList.toggle('open');
  b.classList.toggle('open',o);
  b.childNodes[0].textContent=o?'Hide extras ':'Show all '+d.querySelectorAll('.mpill').length+' words ';
}

// Search
const sOv=document.getElementById('sOv'),sIn=document.getElementById('sIn'),
  sRe=document.getElementById('sRe'),sCt=document.getElementById('sCt');
const SD=D.flatMap(c=>c.w.map(w=>({w,zh:Z[w]||'',em:E[w]||'',cat:c.zh})));

function openS(){sOv.classList.add('open');setTimeout(()=>sIn.focus(),50);renS('')}
function closeS(){sOv.classList.remove('open');sIn.value=''}

document.getElementById('sTrig').onclick=openS;
document.getElementById('sCl').onclick=closeS;
sOv.addEventListener('click',e=>{if(e.target===sOv)closeS()});
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openS()}
  if(e.key==='Escape'&&sOv.classList.contains('open'))closeS();
});
sIn.addEventListener('input',()=>renS(sIn.value));

function renS(q){
  q=q.trim().toLowerCase();
  const m=q?SD.filter(d=>d.w.toLowerCase().includes(q)||d.zh.includes(q)):SD;
  sCt.textContent=q?`${m.length} of 176 match "${q}"`:'176 words \u2014 type English or Chinese';
  if(!m.length){sRe.innerHTML='<div class="s-empty"><div class="be">\u{1F914}</div>No matches</div>';return}
  sRe.innerHTML=m.map(d=>`
    <div class="sr-c" onclick="showW('${d.w.replace(/'/g,"\\'")}');closeS()">
      <span class="re">${d.em}</span>
      <span class="rn">${q?d.w.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>'):d.w}</span>
      <span class="rz">${d.zh}</span>
      <span class="rc">${d.cat}</span>
    </div>`).join('');
}
